# OpenClaw Multi-Tenant Deployment
#
# Architecture:
#   simple-front (public:3000) -> gateway (internal+external) -> per-user containers (internal only)
#                                  ↕
#                            postgres (internal)
#
# User containers are created dynamically by the gateway via Docker API,
# NOT defined in this compose file.

name: openclaw

services:
  postgres:
    container_name: openclaw-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nanobot
      POSTGRES_PASSWORD: nanobot
      POSTGRES_DB: nanobot_platform
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - openclaw-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanobot -d nanobot_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    container_name: openclaw-gateway
    build: ./platform
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      PLATFORM_DATABASE_URL: postgresql+asyncpg://nanobot:nanobot@postgres:5432/nanobot_platform
      PLATFORM_JWT_SECRET: ${JWT_SECRET:-change-me-in-production}

      # 启动时自动创建管理员账号
      PLATFORM_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      PLATFORM_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # LLM API Keys — ONLY here, never in user containers
      PLATFORM_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PLATFORM_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PLATFORM_OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      PLATFORM_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      PLATFORM_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PLATFORM_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      PLATFORM_MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      PLATFORM_MINIMAX_API_BASE: ${MINIMAX_API_BASE:-}
      PLATFORM_AIHUBMIX_API_KEY: ${AIHUBMIX_API_KEY:-}
      PLATFORM_MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      PLATFORM_KIMI_API_KEY: ${KIMI_API_KEY:-}
      PLATFORM_ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      PLATFORM_DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}

      # Self-hosted vLLM
      PLATFORM_HOSTED_VLLM_API_KEY: ${HOSTED_VLLM_API_KEY:-}
      PLATFORM_HOSTED_VLLM_API_BASE: ${HOSTED_VLLM_API_BASE:-}

      PLATFORM_DEFAULT_MODEL: ${DEFAULT_MODEL:-dashscope/qwen3-coder-plus}
      PLATFORM_OPENCLAW_IMAGE: openclaw:latest
      PLATFORM_DEPLOY_VERSION: ${DEPLOY_VERSION:-}
      PLATFORM_CONTAINER_NETWORK: openclaw-internal
      PLATFORM_SHARED_OPENCLAW_ENABLED: ${PLATFORM_SHARED_OPENCLAW_ENABLED:-false}
      PLATFORM_SHARED_OPENCLAW_URL: ${PLATFORM_SHARED_OPENCLAW_URL:-http://shared-openclaw:18080}
      PLATFORM_SHARED_OPENCLAW_SYSTEM_TOKEN: ${PLATFORM_SHARED_OPENCLAW_SYSTEM_TOKEN:-shared-openclaw-system-token}
      PLATFORM_CONTAINER_TZ: ${CONTAINER_TZ:-Asia/Shanghai}
      PLATFORM_CONTAINER_MEMORY_LIMIT: ${PLATFORM_CONTAINER_MEMORY_LIMIT:-2g}
      PLATFORM_CONTAINER_SHM_SIZE: ${PLATFORM_CONTAINER_SHM_SIZE:-1g}
      PLATFORM_CONTAINER_DATA_DIR: /data/openclaw-users
      PLATFORM_USER_OPENVIKING_ENABLED: ${USER_OPENVIKING_ENABLED:-false}
      PLATFORM_USER_OPENVIKING_IMAGE: ${USER_OPENVIKING_IMAGE:-ghcr.io/volcengine/openviking:latest}
      PLATFORM_USER_OPENVIKING_PORT: ${USER_OPENVIKING_PORT:-1933}
      PLATFORM_USER_OPENVIKING_MEMORY_LIMIT: ${USER_OPENVIKING_MEMORY_LIMIT:-1g}
      PLATFORM_USER_OPENVIKING_CPU_LIMIT: ${USER_OPENVIKING_CPU_LIMIT:-1}
      PLATFORM_USER_OPENVIKING_API_KEY: ${USER_OPENVIKING_API_KEY:-}
      PLATFORM_USER_OPENVIKING_CONF_CONTENT: ${USER_OPENVIKING_CONF_CONTENT:-}
      PLATFORM_USER_OPENVIKING_INSTALL_PLUGIN: ${USER_OPENVIKING_INSTALL_PLUGIN:-false}
      PLATFORM_USER_OPENVIKING_FORCE_UNSAFE_PLUGIN_INSTALL: ${USER_OPENVIKING_FORCE_UNSAFE_PLUGIN_INSTALL:-true}
      PLATFORM_USER_OPENVIKING_EMBEDDING_PROVIDER: ${USER_OPENVIKING_EMBEDDING_PROVIDER:-minimax}
      PLATFORM_USER_OPENVIKING_EMBEDDING_MODEL: ${USER_OPENVIKING_EMBEDDING_MODEL:-embo-01}
      PLATFORM_USER_OPENVIKING_EMBEDDING_API_BASE: ${USER_OPENVIKING_EMBEDDING_API_BASE:-https://api.minimax.chat/v1/embeddings}
      PLATFORM_USER_OPENVIKING_EMBEDDING_DIMENSION: ${USER_OPENVIKING_EMBEDDING_DIMENSION:-1536}
      PLATFORM_USER_OPENVIKING_EMBEDDING_INPUT: ${USER_OPENVIKING_EMBEDDING_INPUT:-text}
      PLATFORM_USER_OPENVIKING_EMBEDDING_MAX_CONCURRENT: ${USER_OPENVIKING_EMBEDDING_MAX_CONCURRENT:-2}
      PLATFORM_USER_OPENVIKING_EMBEDDING_MAX_INPUT_TOKENS: ${USER_OPENVIKING_EMBEDDING_MAX_INPUT_TOKENS:-2048}
      PLATFORM_USER_OPENVIKING_VLM_PROVIDER: ${USER_OPENVIKING_VLM_PROVIDER:-openai}
      PLATFORM_USER_OPENVIKING_VLM_MODEL: ${USER_OPENVIKING_VLM_MODEL:-deepseek-chat}
      PLATFORM_USER_OPENVIKING_VLM_API_BASE: ${USER_OPENVIKING_VLM_API_BASE:-https://api.deepseek.com/v1}
      PLATFORM_USER_OPENVIKING_VLM_TEMPERATURE: ${USER_OPENVIKING_VLM_TEMPERATURE:-0}
      PLATFORM_USER_OPENVIKING_VLM_TIMEOUT: ${USER_OPENVIKING_VLM_TIMEOUT:-90}
      PLATFORM_USER_OPENVIKING_VLM_MAX_CONCURRENT: ${USER_OPENVIKING_VLM_MAX_CONCURRENT:-2}
      PLATFORM_USER_OPENVIKING_PLUGIN_TIMEOUT_MS: ${USER_OPENVIKING_PLUGIN_TIMEOUT_MS:-2000}
      PLATFORM_USER_OPENVIKING_PLUGIN_AUTO_RECALL: ${USER_OPENVIKING_PLUGIN_AUTO_RECALL:-false}
      PLATFORM_USER_OPENVIKING_PLUGIN_RECALL_LIMIT: ${USER_OPENVIKING_PLUGIN_RECALL_LIMIT:-3}
      PLATFORM_USER_OPENVIKING_PLUGIN_RECALL_SCORE_THRESHOLD: ${USER_OPENVIKING_PLUGIN_RECALL_SCORE_THRESHOLD:-0.18}
      PLATFORM_USER_OPENVIKING_PLUGIN_RECALL_MAX_INJECTED_CHARS: ${USER_OPENVIKING_PLUGIN_RECALL_MAX_INJECTED_CHARS:-2500}
      PLATFORM_USER_OPENVIKING_PLUGIN_RECALL_RESOURCES: ${USER_OPENVIKING_PLUGIN_RECALL_RESOURCES:-false}
      PLATFORM_USER_OPENVIKING_PLUGIN_CAPTURE_MAX_LENGTH: ${USER_OPENVIKING_PLUGIN_CAPTURE_MAX_LENGTH:-12000}
      PLATFORM_SKILLS_REPO_MIRROR_MAP: ${SKILLS_REPO_MIRROR_MAP:-}
      PLATFORM_GITHUB_MIRROR_PREFIXES: ${GITHUB_MIRROR_PREFIXES:-}
      LITELLM_LOG: ${LITELLM_LOG:-ERROR}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker API access for container management
      - userdata:/data/openclaw-users
    networks:
      - openclaw-internal   # talk to postgres + user containers
      - openclaw-external   # accept traffic from frontend / public
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: ["legacy-front"]
    container_name: openclaw-frontend
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${FRONTEND_PORT:-3080}:3000"
    networks:
      - openclaw-external
    depends_on:
      - gateway

  shared-openclaw:
    profiles: ["shared"]
    container_name: openclaw-shared
    image: openclaw:latest
    command: ["node", "bridge/dist/bridge/start.js"]
    ports:
      - "${BRIDGE_PORT:-18080}:18080"
    environment:
      NANOBOT_PROXY__URL: http://gateway:8080/llm/v1
      NANOBOT_PROXY__TOKEN: ${PLATFORM_SHARED_OPENCLAW_SYSTEM_TOKEN:-shared-openclaw-system-token}
      NANOBOT_AGENTS__DEFAULTS__MODEL: ${DEFAULT_MODEL:-dashscope/qwen3-coder-plus}
      DEPLOY_VERSION: ${DEPLOY_VERSION:-}
      TZ: ${CONTAINER_TZ:-Asia/Shanghai}
      BRIDGE_ENABLE_CHANNELS: "0"
      NANOBOT_SKILLS_REPO_MIRROR_MAP: ${SKILLS_REPO_MIRROR_MAP:-}
      NANOBOT_GITHUB_MIRROR_PREFIXES: ${GITHUB_MIRROR_PREFIXES:-}
    volumes:
      - shared_openclaw_data:/root/.openclaw
    networks:
      - openclaw-internal
    depends_on:
      - gateway

  manage-front:
    profiles: ["admin-front"]
    container_name: openclaw-manage
    build: ./manage_front
    ports:
      - "${MANAGE_PORT:-3081}:3000"
    environment:
      - API_URL=http://gateway:8080
    networks:
      - openclaw-external
    depends_on:
      - gateway

  simple-front:
    container_name: openclaw-simple
    build:
      context: ./simple_front
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${SIMPLE_PORT:-3085}:3000"
    networks:
      - openclaw-external
    depends_on:
      - gateway

  share-openclaw-front:
    profiles: ["shared"]
    container_name: openclaw-share-front
    build:
      context: ./share_openclaw_front
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${SHARE_FRONT_PORT:-3083}:3000"
    networks:
      - openclaw-external
    depends_on:
      - gateway

networks:
  openclaw-internal:
    name: openclaw-internal    # explicit name — prevents Compose project-name prefix
    driver: bridge
    internal: false  # allow internet access for user containers to download tools
  openclaw-external:
    name: openclaw-external
    driver: bridge

volumes:
  pgdata:
  userdata:
  shared_openclaw_data:
